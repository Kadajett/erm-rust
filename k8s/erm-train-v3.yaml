apiVersion: v1
kind: Pod
metadata:
  name: erm-train-v3
  namespace: pcn-train
  labels:
    app: erm-train
    version: v3
spec:
  restartPolicy: Never
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: kubernetes.io/hostname
            operator: In
            values:
            - theshire
  containers:
  - name: erm-train
    image: ubuntu:24.04
    command: ["/bin/bash", "-c"]
    args:
    - |
      set -e
      echo "=== ERM Training v3 (burn + wgpu GPU) ==="
      
      # Install Vulkan ICD loader
      apt-get update -qq && apt-get install -y -qq libvulkan1 mesa-vulkan-drivers vulkan-tools 2>&1 | tail -3
      
      # Create NVIDIA Vulkan ICD
      mkdir -p /etc/vulkan/icd.d
      echo '{"file_format_version": "1.0.0", "ICD": {"library_path": "libGLX_nvidia.so.0", "api_version": "1.3"}}' > /etc/vulkan/icd.d/nvidia_icd.json
      
      echo "Host: $(hostname)"
      echo "Corpus: $(wc -c < /workspace/erm-rust/data/text/corpus.txt) bytes"
      
      echo "=== Checking GPU ==="
      nvidia-smi 2>&1 | head -15 || echo "nvidia-smi not found"
      vulkaninfo --summary 2>&1 | head -20 || echo "vulkaninfo failed"
      
      echo "=== Starting GPU Training ==="
      /workspace/erm-rust/bin/erm burn-train \
        --data /workspace/erm-rust/data/text/corpus.txt \
        --steps 10000 \
        --backend gpu \
        2>&1 | tee /workspace/erm-rust/data/gpu-train-log.txt
      
      echo "=== Training Complete ==="
    resources:
      requests:
        memory: "4Gi"
        cpu: "2"
        nvidia.com/gpu: "1"
      limits:
        memory: "8Gi"
        cpu: "4"
        nvidia.com/gpu: "1"
    env:
    - name: LD_LIBRARY_PATH
      value: /usr/local/cuda-13.0/targets/x86_64-linux/lib:/usr/local/cuda/lib64
    - name: NVIDIA_DRIVER_CAPABILITIES
      value: all
    - name: NVIDIA_VISIBLE_DEVICES
      value: all
    - name: WGPU_BACKEND
      value: vulkan
    volumeMounts:
    - name: workspace
      mountPath: /workspace
    - name: cuda-13-0
      mountPath: /usr/local/cuda-13.0
      readOnly: true
    - name: cuda-13-1
      mountPath: /usr/local/cuda
      readOnly: true
  volumes:
  - name: workspace
    hostPath:
      path: /home/kadajett/dev
  - name: cuda-13-0
    hostPath:
      path: /usr/local/cuda-13.0
  - name: cuda-13-1
    hostPath:
      path: /usr/local/cuda-13.1
