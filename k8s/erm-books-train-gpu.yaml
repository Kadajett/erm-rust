apiVersion: v1
kind: Pod
metadata:
  name: erm-books-train-gpu
  namespace: pcn-train
  labels:
    app: erm-books-train
    variant: books-aggressive-gpu
spec:
  restartPolicy: Never
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: kubernetes.io/hostname
            operator: In
            values:
            - theshire
  containers:
  - name: erm-books-train
    image: ubuntu:24.04
    command: ["/bin/bash","-c"]
    args:
    - |
      set -e
      echo "=== ERM Books Aggressive GPU Training ==="
      echo "Host: $(hostname)"

      apt-get update -qq || true
      apt-get install -y -qq libvulkan1 mesa-vulkan-drivers vulkan-tools ca-certificates curl ffmpeg librsvg2-bin || true

      mkdir -p /workspace/erm-rust/data/text
      if [ -d /workspace/rust-pcn/data/books ]; then
        echo "Found books in /workspace/rust-pcn/data/books"
        cat /workspace/rust-pcn/data/books/*.txt > /workspace/erm-rust/data/text/corpus_books.txt || true
      else
        echo "No books found in /workspace/rust-pcn/data/books" >&2
        exit 1
      fi

      echo "Corpus bytes: $(wc -c < /workspace/erm-rust/data/text/corpus_books.txt)"

      # If config exists in rust-pcn, copy it; otherwise fall back to embedded config
      if [ -f /workspace/rust-pcn/data/books_aggressive_config.json ]; then
        cp /workspace/rust-pcn/data/books_aggressive_config.json /workspace/erm-rust/data/books_aggressive_config.json
      fi

      /workspace/erm-rust/bin/erm colony-train \
        --data /workspace/erm-rust/data/text/corpus_books.txt \
        --steps 20000 \
        --config /workspace/erm-rust/data/books_aggressive_config.json \
        --backend gpu \
        --log-every 100 \
        --checkpoint-dir /workspace/erm-rust/data/colony-checkpoints 2>&1 | tee /workspace/erm-rust/data/colony-books-train-log.txt

      echo "=== Training finished ==="
    resources:
      requests:
        memory: "12Gi"
        cpu: "4"
        nvidia.com/gpu: "1"
      limits:
        memory: "16Gi"
        cpu: "8"
        nvidia.com/gpu: "1"
    env:
    - name: LD_LIBRARY_PATH
      value: /usr/local/cuda-13.0/targets/x86_64-linux/lib:/usr/local/cuda/lib64
    - name: NVIDIA_DRIVER_CAPABILITIES
      value: compute,utility
    - name: NVIDIA_VISIBLE_DEVICES
      value: all
    - name: CUDA_VISIBLE_DEVICES
      value: "0"
    - name: WGPU_BACKEND
      value: vulkan
    - name: RUST_BACKTRACE
      value: "1"
    - name: RAYON_NUM_THREADS
      value: "4"
    volumeMounts:
    - name: rust-pcn
      mountPath: /workspace/rust-pcn
    - name: erm-rust
      mountPath: /workspace/erm-rust
    - name: cuda-13-0
      mountPath: /usr/local/cuda-13.0
      readOnly: true
    - name: cuda-13-1
      mountPath: /usr/local/cuda
      readOnly: true
  volumes:
  - name: rust-pcn
    hostPath:
      path: /home/kadajett/dev/rust-pcn
      type: Directory
  - name: erm-rust
    hostPath:
      path: /home/kadajett/dev/erm-rust
      type: Directory
  - name: cuda-13-0
    hostPath:
      path: /usr/local/cuda-13.0
  - name: cuda-13-1
    hostPath:
      path: /usr/local/cuda-13.1
