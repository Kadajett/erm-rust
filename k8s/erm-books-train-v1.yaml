apiVersion: v1
kind: Pod
metadata:
  name: erm-books-train-v1
  namespace: pcn-train
  labels:
    app: erm-books-train
    variant: books-aggressive-v1
spec:
  restartPolicy: Never
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: kubernetes.io/hostname
            operator: In
            values:
            - theshire
  containers:
  - name: erm-books-train
    image: ubuntu:24.04
    command: ["/bin/bash", "-c"]
    args:
    - |
      set -e
      echo "=== ERM Books Aggressive Training (GPU) ==="
      echo "Host: $(hostname)"

      # Install Vulkan ICD loader
      apt-get update -qq && apt-get install -y -qq libvulkan1 mesa-vulkan-drivers vulkan-tools ca-certificates curl ffmpeg librsvg2-bin 2>&1 | tail -n 5

      mkdir -p /etc/vulkan/icd.d
      echo '{"file_format_version": "1.0.0", "ICD": {"library_path": "libGLX_nvidia.so.0", "api_version": "1.3"}}' > /etc/vulkan/icd.d/nvidia_icd.json || true

      # Prepare corpus (concatenate all book files)
      mkdir -p /workspace/erm-rust/data/text
      if [ -d /workspace/data/books ]; then
        echo "Found books dir: /workspace/data/books"
        cat /workspace/data/books/*.txt > /workspace/erm-rust/data/text/corpus_books.txt || true
      elif [ -d /workspace/data/books-code ]; then
        cat /workspace/data/books-code/*.txt > /workspace/erm-rust/data/text/corpus_books.txt || true
      else
        echo "No books found under /workspace/data/books or /workspace/data/books-code" >&2
        exit 1
      fi

      echo "Corpus bytes: $(wc -c < /workspace/erm-rust/data/text/corpus_books.txt)"

      # Write aggressive config
      cat > /workspace/erm-rust/data/books_aggressive_config.json <<'JSON'
{
  "vocab_size": 0,
  "seq_len": 1024,
  "hidden_dim": 384,
  "num_blocks": 4,
  "num_heads": 8,
  "mlp_expansion": 4,
  "dropout": 0.0,
  "emax": 32,
  "num_ants": 256,
  "topk": 8,
  "pmax": 8,
  "refinement_steps": 6,
  "batch_size": 2,
  "mask_rate_max": 0.8,
  "mask_rate_min": 0.15,
  "replace_rate_max": 0.1,
  "replace_rate_min": 0.02,
  "pheromone_evap": 0.1,
  "pheromone_eta": 0.8,
  "taint_zeta": 0.3,
  "taint_max": 5.0,
  "taint_decay": 0.05,
  "phi_max": 100.0,
  "phi_init": 0.05,
  "route_epsilon": 1e-6,
  "route_lambda": 1.0,
  "route_mu": 0.01,
  "prune_min_score": -1.0,
  "prune_max_age": 1000,
  "leader_ema_gamma": 0.3,
  "death_streak": 5,
  "max_edits_per_step": 0.20,
  "leader_fraction": 0.15,
  "learning_rate": 0.0005,
  "weight_decay": 0.01,
  "warmup_steps": 100
}
JSON

      echo "Starting GPU training (aggressive)"

      /workspace/erm-rust/bin/erm colony-train \
        --data /workspace/erm-rust/data/text/corpus_books.txt \
        --steps 20000 \
        --config /workspace/erm-rust/data/books_aggressive_config.json \
        --backend gpu \
        --log-every 100 \
        --checkpoint-dir /workspace/erm-rust/data/colony-checkpoints \
        2>&1 | tee /workspace/erm-rust/data/colony-books-train-log.txt

      echo "=== Training finished ==="
    resources:
      requests:
        memory: "8Gi"
        cpu: "4"
        nvidia.com/gpu: "1"
      limits:
        memory: "12Gi"
        cpu: "8"
        nvidia.com/gpu: "1"
    env:
    - name: LD_LIBRARY_PATH
      value: /usr/local/cuda-13.0/targets/x86_64-linux/lib:/usr/local/cuda/lib64:/usr/lib/x86_64-linux-gnu
    - name: NVIDIA_DRIVER_CAPABILITIES
      value: compute,utility
    - name: NVIDIA_VISIBLE_DEVICES
      value: all
    - name: CUDA_VISIBLE_DEVICES
      value: "0"
    - name: WGPU_BACKEND
      value: vulkan
    - name: RUST_BACKTRACE
      value: 1
    - name: RAYON_NUM_THREADS
      value: "4"
    volumeMounts:
    - name: workspace
      mountPath: /workspace
    - name: books
      mountPath: /workspace/data/books
    - name: cuda-13-0
      mountPath: /usr/local/cuda-13.0
      readOnly: true
    - name: cuda-13-1
      mountPath: /usr/local/cuda
      readOnly: true
  volumes:
  - name: workspace
    hostPath:
      path: /home/kadajett/dev/rust-pcn
  - name: books
    hostPath:
      path: /home/kadajett/dev/rust-pcn/data/books
  - name: cuda-13-0
    hostPath:
      path: /usr/local/cuda-13.0
  - name: cuda-13-1
    hostPath:
      path: /usr/local/cuda-13.1
