apiVersion: batch/v1
kind: Job
metadata:
  name: erm-alice-run
  namespace: pcn-train
  labels:
    app: erm-diffusion
    exp: alice-run
    variant: seq512-h256-a128-e16-b2-T6-alice
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: erm-diffusion
        exp: alice-run
    spec:
      restartPolicy: Never
      runtimeClassName: nvidia
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - theshire
      containers:
      - name: erm-train
        image: ubuntu:24.04
        command: ["/bin/bash", "-c"]
        args:
        - |
          set -eo pipefail
          EXP_ID="alice-run"
          echo "=== ERM Alice-in-Wonderland Dedicated Training ==="
          echo "Host: $(hostname) | Start: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Install Vulkan for GPU
          apt-get update -qq 2>&1 | tail -1 || true
          apt-get install -y -qq --no-install-recommends libvulkan1 mesa-vulkan-drivers ca-certificates 2>&1 | tail -3 || true
          mkdir -p /etc/vulkan/icd.d
          echo '{"file_format_version":"1.0.0","ICD":{"library_path":"libGLX_nvidia.so.0","api_version":"1.3"}}' > /etc/vulkan/icd.d/nvidia_icd.json || true

          # Create an isolated data directory with only Alice
          ALICE_DIR="/workspace/erm-rust/data/alice-only"
          mkdir -p "${ALICE_DIR}"
          cp /workspace/rust-pcn/data/books/alice-in-wonderland.txt "${ALICE_DIR}/"
          EXP_DIR="/workspace/erm-rust/data/experiments/${EXP_ID}"
          mkdir -p "${EXP_DIR}"

          echo "Alice data dir: ${ALICE_DIR} ($(wc -c < ${ALICE_DIR}/alice-in-wonderland.txt) bytes, 1 file)"

          # ~30 minute run: estimate ~15-20 steps/min for this config → ~500-600 steps
          # Use 10000 as max but we'll kill after 30 minutes if needed
          # With checkpoint_every=250, we get checkpoints at 250, 500, 750, ...
          # Write full config with emax=16 (not overridable via CLI)
          cat > "${EXP_DIR}/config.json" <<'CFGEOF'
          {
            "vocab_size": 0,
            "seq_len": 512,
            "hidden_dim": 256,
            "num_blocks": 6,
            "num_heads": 4,
            "mlp_expansion": 4,
            "dropout": 0.1,
            "emax": 16,
            "num_ants": 128,
            "topk": 8,
            "pmax": 8,
            "refinement_steps": 6,
            "batch_size": 2,
            "mask_rate_max": 0.8,
            "mask_rate_min": 0.15,
            "replace_rate_max": 0.1,
            "replace_rate_min": 0.02,
            "pheromone_evap": 0.1,
            "pheromone_eta": 0.5,
            "taint_zeta": 0.3,
            "taint_max": 5.0,
            "taint_decay": 0.05,
            "phi_max": 100.0,
            "phi_init": 0.05,
            "route_epsilon": 0.000001,
            "route_lambda": 1.0,
            "route_mu": 0.01,
            "death_streak": 5,
            "max_edits_per_step": 0.15,
            "leader_fraction": 0.1,
            "prune_min_score": -1.0,
            "prune_max_age": 1000,
            "leader_ema_gamma": 0.3,
            "warmstart_steps": 0,
            "warmstart_death_mult": 4,
            "learning_rate": 0.001,
            "weight_decay": 0.01,
            "warmup_steps": 1000,
            "diffusion_steps": 6,
            "noise_schedule": "cosine",
            "gamma_min": 0.5,
            "gamma_max": 2.0,
            "use_paragraph_spans": true,
            "tokenizer_type": "bpe",
            "bpe_vocab_size": 4096,
            "bpe_vocab_path": "",
            "exp_id": "",
            "metrics_path": ""
          }
          CFGEOF

          echo "=== Starting ${EXP_ID} training at $(date -u +%H:%M:%S) ==="
          echo "Config: seq_len=512 hidden_dim=256 num_ants=128 emax=16 batch=2 T=6"
          echo ""

          /workspace/erm-rust/bin/erm diffusion-train \
            --data "${ALICE_DIR}" \
            --steps 10000 \
            --config "${EXP_DIR}/config.json" \
            --backend gpu \
            --exp-id "${EXP_ID}" \
            --checkpoint-dir "${EXP_DIR}" \
            --checkpoint-every 250 \
            --log-every 50 \
            2>&1 | tee "${EXP_DIR}/train.log"

          echo "=== ${EXP_ID} complete | $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="
        env:
        - name: LD_LIBRARY_PATH
          value: "/usr/local/cuda-13.0/targets/x86_64-linux/lib:/usr/local/cuda/lib64:/usr/lib/x86_64-linux-gnu"
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: "compute,utility"
        - name: NVIDIA_VISIBLE_DEVICES
          value: "all"
        - name: WGPU_BACKEND
          value: "vulkan"
        - name: RUST_BACKTRACE
          value: "1"
        - name: RAYON_NUM_THREADS
          value: "2"
        resources:
          requests:
            cpu: "2"
            memory: "4Gi"
            nvidia.com/gpu: "1"
          limits:
            cpu: "4"
            memory: "16Gi"
            nvidia.com/gpu: "1"
        volumeMounts:
        - name: erm-rust
          mountPath: /workspace/erm-rust
        - name: rust-pcn
          mountPath: /workspace/rust-pcn
          readOnly: true
        - name: cuda-13-0
          mountPath: /usr/local/cuda-13.0
          readOnly: true
        - name: cuda-13-1
          mountPath: /usr/local/cuda
          readOnly: true
      volumes:
      - name: erm-rust
        hostPath:
          path: /home/kadajett/dev/erm-rust
          type: Directory
      - name: rust-pcn
        hostPath:
          path: /home/kadajett/dev/rust-pcn
          type: Directory
      - name: cuda-13-0
        hostPath:
          path: /usr/local/cuda-13.0
      - name: cuda-13-1
        hostPath:
          path: /usr/local/cuda-13.1
