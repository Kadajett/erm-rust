apiVersion: batch/v1
kind: Job
metadata:
  name: erm-diff-exp-a
  namespace: pcn-train
  labels:
    app: erm-diffusion
    exp: exp-a
    variant: seq1024-h192-a64-e8-b1-T6
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: erm-diffusion
        exp: exp-a
    spec:
      restartPolicy: Never
      runtimeClassName: nvidia
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - theshire
      containers:
      - name: erm-diff-exp-a
        image: ubuntu:24.04
        command: ["/bin/bash", "-c"]
        args:
        - |
          set -eo pipefail
          EXP_ID="exp-a"
          echo "=== ERM Diffusion Experiment: ${EXP_ID} ==="
          echo "Host: $(hostname) | Start: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

          apt-get update -qq 2>&1 | tail -1 || true
          apt-get install -y -qq --no-install-recommends libvulkan1 mesa-vulkan-drivers ca-certificates 2>&1 | tail -3 || true
          mkdir -p /etc/vulkan/icd.d
          echo '{"file_format_version":"1.0.0","ICD":{"library_path":"libGLX_nvidia.so.0","api_version":"1.3"}}' > /etc/vulkan/icd.d/nvidia_icd.json || true

          BOOK_DIR="/workspace/rust-pcn/data/books"
          EXP_DIR="/workspace/erm-rust/data/experiments/${EXP_ID}"
          mkdir -p "${EXP_DIR}"

          echo "Book dir: ${BOOK_DIR} ($(ls ${BOOK_DIR} | wc -l) files)"

          # OOM smoke test: 200 steps first
          echo "=== Smoke test (200 steps) ==="
          /workspace/erm-rust/bin/erm diffusion-train \
            --data "${BOOK_DIR}" \
            --steps 200 \
            --backend gpu \
            --exp-id "${EXP_ID}-smoke" \
            --seq-len 1024 \
            --hidden-dim 192 \
            --num-ants 64 \
            --batch 1 \
            --diffusion-t 6 \
            --checkpoint-dir "${EXP_DIR}/smoke" \
            --checkpoint-every 0 \
            --log-every 50 \
            2>&1 | tee "${EXP_DIR}/smoke.log"
          SMOKE_EXIT=$?

          if [ $SMOKE_EXIT -ne 0 ]; then
            echo "Smoke test failed (likely OOM). Retrying with ants=32 batch=1..."
            /workspace/erm-rust/bin/erm diffusion-train \
              --data "${BOOK_DIR}" \
              --steps 200 \
              --backend gpu \
              --exp-id "${EXP_ID}-smoke-retry" \
              --seq-len 1024 \
              --hidden-dim 192 \
              --num-ants 32 \
              --batch 1 \
              --diffusion-t 6 \
              --checkpoint-dir "${EXP_DIR}/smoke-retry" \
              --checkpoint-every 0 \
              --log-every 50 \
              2>&1 | tee "${EXP_DIR}/smoke-retry.log"
          fi

          echo "=== Full training run (10000 steps) ==="
          /workspace/erm-rust/bin/erm diffusion-train \
            --data "${BOOK_DIR}" \
            --steps 10000 \
            --backend gpu \
            --exp-id "${EXP_ID}" \
            --seq-len 1024 \
            --hidden-dim 192 \
            --num-ants 64 \
            --batch 1 \
            --diffusion-t 6 \
            --checkpoint-dir "${EXP_DIR}" \
            --checkpoint-every 500 \
            --log-every 50 \
            2>&1 | tee "${EXP_DIR}/train.log"

          echo "=== ${EXP_ID} complete | $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="
        resources:
          requests:
            cpu: "2"
            memory: "6Gi"
            nvidia.com/gpu: "1"
          limits:
            cpu: "4"
            memory: "8Gi"
            nvidia.com/gpu: "1"
        volumeMounts:
        - name: erm-rust
          mountPath: /workspace/erm-rust
        - name: rust-pcn
          mountPath: /workspace/rust-pcn
      volumes:
      - name: erm-rust
        hostPath:
          path: /home/kadajett/dev/erm-rust
          type: Directory
      - name: rust-pcn
        hostPath:
          path: /home/kadajett/dev/rust-pcn
          type: Directory
